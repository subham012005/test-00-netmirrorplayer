        function getCookieValue(name) {

            return localStorage.getItem(name);
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const [key, value] = cookies[i].trim().split('=');
                if (key === name) return value;
            }
            return null;
        }

        function sendData(value) {
            if (value.startsWith("666666") || value.startsWith("777777")) { var value123 = value; } else { var value123 = value + "=" + getCookieValue(value); }
            console.log("value:", value123);
            window.parent.postMessage(value123, "https://net77.cc");

        function createCookie(name, value, days) {
            var expires;
            if (days) {
                var date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toGMTString();
            } else { expires = ""; }
            document.cookie = encodeURIComponent(name) + "=" + encodeURIComponent(value) + expires + "; domain=" + location.host.split(":")[0] + "; path=/";
        }
        function readCookie(name) {
            var nameEQ = encodeURIComponent(name) + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i];
                while (c.charAt(0) === ' ')
                    c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
